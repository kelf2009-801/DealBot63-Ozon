<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>DealBot63 · Все стили</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff}
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px;max-width:400px;width:100%;text-align:center}
h1{font-size:24px;font-weight:600;margin-bottom:8px}
p{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:24px;line-height:1.5}
.styles{display:flex;flex-direction:column;gap:10px}
.btn{display:block;padding:14px 20px;border-radius:12px;text-decoration:none;font-size:15px;font-weight:500;transition:transform .2s,box-shadow .2s;text-align:center}
.btn:hover{transform:translateY(-2px)}
.btn-emerald{background:#05974f;color:#fff}
.btn-aura{background:rgba(96,165,250,0.15);color:#60A5FA;border:1px solid rgba(96,165,250,0.3)}
.btn-dala{background:rgba(128,82,255,0.15);color:#8052ff;border:1px solid rgba(128,82,255,0.3)}
.btn-authkit{background:rgba(102,58,243,0.15);color:#b6d9fc;border:1px solid rgba(102,58,243,0.3)}
.btn-grove{background:rgba(76,175,80,0.15);color:#4CAF50;border:1px solid rgba(76,175,80,0.3)}
.footer{margin-top:20px;font-size:11px;color:rgba(255,255,255,0.2)}
@media(max-width:480px){.card{padding:20px}h1{font-size:20px}.btn{font-size:14px;padding:12px 16px}}
</style>
</head>
<body>
<div class="card">
  <h1>🎨 DealBot63</h1>
  <p>Выбери стиль дашборда 👇</p>
  <div class="styles">
    <a class="btn btn-emerald" href="?style=emerald">🌿 Emerald — Светлый финтех</a>
    <a class="btn btn-aura" href="?style=aura">🌌 Aura Glass — Стекло, неон</a>
    <a class="btn btn-dala" href="?style=dala">🪐 Dala Cosmic — Космос, фиолетовый</a>
    <a class="btn btn-authkit" href="?style=authkit">🔷 AuthKit Blueprint — Чертежи</a>
    <a class="btn btn-grove" href="?style=grove">💀 Grove Street — Хакерский, GTA</a>
  </div>
  <div class="footer">Просто сохрани этот файл и открой в браузере</div>
</div>
</body>
</html>
